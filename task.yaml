prompt: |
  You are given a JSON file at /workdir/data/validation_request.json that contains JSON Schema
  definitions and documents to validate against those schemas.

  ## Your Task

  Read the input file, validate each document against its corresponding schema, and write the
  results to /workdir/validation_results.json.

  ## Input File Structure

  The input file has this structure:
  {
    "schemas": [
      { "id": "schema_001", "schema": { ... } },
      ...
    ],
    "documents": [
      { "id": "doc_001", "schema_id": "schema_001", "data": { ... } },
      ...
    ]
  }

  Each document references a schema by "schema_id". Validate the document's "data" field against
  the referenced schema.

  ## Validation Rules You Must Implement

  ### 1. Type Validation
  - "string"  → value must be a string
  - "number"  → value must be int or float
  - "integer" → value must be a whole number (no decimals); 3.0 is NOT valid integer, only int type
  - "boolean" → value must be true or false
  - "null"    → value must be null
  - "array"   → value must be an array/list
  - "object"  → value must be an object/dict

  ### 2. String Constraints
  - "minLength": N        → len(value) >= N
  - "maxLength": N        → len(value) <= N
  - "pattern": "regex"   → value must match the given regex pattern (use re.search)
  - "format": "email"    → must match pattern: one or more non-@ chars, @, domain with dot
                            Use: re.match(r'^[^@\s]+@[^@\s]+\.[^@\s]+$', value)
  - "format": "date"     → must match YYYY-MM-DD exactly
                            Use: re.match(r'^\d{4}-\d{2}-\d{2}$', value)
  - "format": "uuid"     → must match 8-4-4-4-12 lowercase hex pattern
                            Use: re.match(r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', value)
  - "format": "uri"      → must start with http:// or https://
                            Use: re.match(r'^https?://', value)

  ### 3. Number Constraints (JSON Schema Draft 4 style)
  - "minimum": N              → value >= N
  - "maximum": N              → value <= N
  - "exclusiveMinimum": true  → value > minimum (requires "minimum" to also be set)
  - "exclusiveMaximum": true  → value < maximum (requires "maximum" to also be set)
  - "multipleOf": N           → value % N == 0 (use math.isclose for floats)

  ### 4. Array Constraints
  - "minItems": N         → len(array) >= N
  - "maxItems": N         → len(array) <= N
  - "uniqueItems": true   → all elements must be unique (compare by value)
  - "items": { schema }   → each element must validate against the items schema

  ### 5. Object Constraints
  - "required": [list]              → each listed key must exist in the object
  - "properties": { key: schema }   → if key exists, validate its value against the schema
  - "additionalProperties": false   → no keys allowed that are not listed in "properties"

  ### 6. Enum Constraint
  - "enum": [list]   → value must be one of the values in the list (use == comparison)

  ## Error Format

  Each error must be a JSON object with these exact fields:
  {
    "path": "$.fieldName",          // Use $. prefix; nested: $.parent.child; array items: $.items[0]
    "message": "Human-readable description of the error",
    "constraint": "constraintName", // e.g. "type", "minLength", "format", "required", etc.
    "expected": "what was expected (as string)",
    "actual": "what was found (as string)"
  }

  For the root-level document itself, use path "$".
  For a top-level field "email", use path "$.email".
  For a nested field, use "$.address.city".
  For array item index 0, use "$.tags[0]".

  ## Output Format

  Write a JSON file to /workdir/validation_results.json with this EXACT structure:

  {
    "validation_results": [
      {
        "document_id": "doc_001",
        "schema_id": "schema_001",
        "valid": true,
        "errors": []
      },
      {
        "document_id": "doc_002",
        "schema_id": "schema_001",
        "valid": false,
        "errors": [
          {
            "path": "$.email",
            "message": "Invalid email format",
            "constraint": "format",
            "expected": "email",
            "actual": "not-an-email"
          }
        ]
      }
    ],
    "summary": {
      "total_documents": 10,
      "valid_documents": 3,
      "invalid_documents": 7,
      "total_errors": 19,
      "errors_by_constraint": {
        "type": 5,
        "required": 3,
        "format": 4,
        "minimum": 2,
        "pattern": 2,
        "enum": 1,
        "uniqueItems": 1,
        "additionalProperties": 1
      }
    }
  }

  Rules:
  - "valid" is true only if errors list is empty
  - "total_errors" = sum of all errors across all documents
  - "errors_by_constraint" counts how many errors exist per constraint name
  - Results must appear in the same order as documents in the input
  - The summary counts must be accurate

  ## Allowed Tools / Libraries
  - Python standard library only: json, re, math, pathlib
  - Do NOT use the jsonschema library or any third-party packages

  ## Edge Cases to Handle
  - If a document references a schema_id that does not exist, report one error with constraint "schema_ref" and path "$"
  - If "exclusiveMinimum" is true but "minimum" is not set, ignore exclusiveMinimum
  - If "exclusiveMaximum" is true but "maximum" is not set, ignore exclusiveMaximum
  - Properties listed in "required" that are missing should each produce a separate error
  - Validate nested objects and arrays recursively
  - Type validation happens before constraint validation for the same field

metadata:
  difficulty: hard
  category: data_validation
  required_tools:
    - bash
    - python
  tags:
    - json
    - schema
    - validation
  time_limit: 600
  memory_limit: 512
  max_agent_timeout_sec: 400
  expert_time_estimate_min: 25
  junior_time_estimate_min: 50
